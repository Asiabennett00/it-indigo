<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Unit Converter">
    <meta name="keywords" content="JavaScript, HTML, CSS, AJAX">
    <meta name="author" content="Your Name">
    <title>Unit Converter</title>
    <link rel="stylesheet" type="text/css" href="assets/style/style.css">
</head>
<body>

<form id="myform" onsubmit="return false;">
    <div class="formcontainer">
        <h1>Unit Converter (AJAX)</h1>

        <fieldset id="detail">
            <legend>Unit Converter (AJAX)</legend>
            <br>

            <!-- From Value -->
            <label class="formlabel" for="FromValue">From Value: </label>
            <input type="text" id="FromValue" name="FromValue" size="15" maxlength="15"
                   data-rule-required="true"
                   data-msg-required="Value is Required"
                   data-rule-number="true"
                   data-msg-number="Value must be numeric">
            <label for="FromValue" class="error" id="FromValueMsg"></label>
            <br><br>

            <!-- From Unit -->
            <label class="formlabel">From Unit: </label>

            <label><input type="radio" name="FromUnit" value="cm"
                data-rule-required="true"
                data-msg-required="From Unit is Required"> centimeters</label>

            <label><input type="radio" name="FromUnit" value="m"> meters</label>
            <label><input type="radio" name="FromUnit" value="km"> kilometers</label>
            <label><input type="radio" name="FromUnit" value="in"> inches</label>
            <label><input type="radio" name="FromUnit" value="ft"> feet</label>
            <label><input type="radio" name="FromUnit" value="yd"> yards</label>
            <label><input type="radio" name="FromUnit" value="mi"> miles</label>

            <label for="FromUnit" class="error" id="FromUnitMsg"></label>
            <br><br>

            <!-- To Unit -->
            <label class="formlabel">To Unit: </label>

            <label><input type="radio" name="ToUnit" value="cm"
                data-rule-required="true"
                data-msg-required="To Unit is Required"> centimeters</label>

            <label><input type="radio" name="ToUnit" value="m"> meters</label>
            <label><input type="radio" name="ToUnit" value="km"> kilometers</label>
            <label><input type="radio" name="ToUnit" value="in"> inches</label>
            <label><input type="radio" name="ToUnit" value="ft"> feet</label>
            <label><input type="radio" name="ToUnit" value="yd"> yards</label>
            <label><input type="radio" name="ToUnit" value="mi"> miles</label>

            <label for="ToUnit" class="error" id="ToUnitMsg"></label>
            <br><br>

            <!-- Result -->
            <label class="formlabel">To Value: </label>
            <span id="Result"></span>
            <br><br>

            <input type="button" value="Calculate" onclick="calculate();">
            <input type="button" value="Clear" onclick="clearform();">

        </fieldset>
    </div>
</form>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/additional-methods.min.js"></script>
<script src="script/script.js"></script>

</body>
</html>
