<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Value History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Currency Value History</h1>

    <form id="currencyForm" novalidate>
      <div class="form-row">
        <label for="baseCurrency">Base Currency:</label>
        <select id="baseCurrency">
          <option value="">Select a Currency...</option>
          <option value="USD">US Dollar</option>
          <option value="GBP">Great Britain Pound</option>
          <option value="EUR">Euro</option>
          <option value="JPY">Japanese Yen</option>
          <option value="CAD">Canadian Dollar</option>
        </select>
        <span class="error" id="baseCurrencyError"></span>
      </div>

      <div class="form-row">
        <label for="toCurrency">Convert to Currency:</label>
        <select id="toCurrency">
          <option value="">Select a Currency...</option>
          <option value="USD">US Dollar</option>
          <option value="GBP">Great Britain Pound</option>
          <option value="EUR">Euro</option>
          <option value="JPY">Japanese Yen</option>
          <option value="CAD">Canadian Dollar</option>
        </select>
        <span class="error" id="toCurrencyError"></span>
      </div>

      <div class="form-row">
        <label for="fromDate">From Date:</label>
        <input type="date" name="fromDate" id="fromDate" />
        <span class="error" id="fromDateError"></span>
      </div>

      <div class="form-row">
        <label for="toDate">To Date:</label>
        <input type="date" name="toDate" id="toDate" />
        <span class="error" id="toDateError"></span>
      </div>

      <div class="button-row">
        <input type="submit" value="showResults" id="showResults" name="showResults" onclick="showCurrencyChart();">
        <button type="button" id="clearBtn">Clear</button>
      </div>
    </form>

    <div id="generalError" class="general-error"></div>

    <hr />

   <section id="resultsSection">
      <h2 id="chartHeading">Currency Value History</h2>
      <canvas id="currencyChart"></canvas>
    </section>
  </div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/jquery.validate.min.js"></script>
        <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/additional-methods.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.3/Chart.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
